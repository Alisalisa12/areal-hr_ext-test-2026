services:
  api:
    build:
      context: .
      dockerfile: containers/api/Dockerfile
    container_name: hr_backend
    command: sh -c "npm run migrate up && npm run start:prod"
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    restart: always
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    container_name: hr_postgres_db
    restart: always
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
